{% extends "base.html" %}

{% block title %}Add Book - My Library{% endblock %}

{% block content %}
<section class="section light">
    <div class="container">
        <h1 class="section-heading">Add New Book</h1>
        {% if message %}
        <p class="body">{{ message }}</p>
        {% endif %}
        <form action="/books/add" method="post">
            <label for="isbn">ISBN:</label>
            <input type="text" id="isbn" name="isbn" required><br><br>

            <label for="title_cn">Chinese Title:</label>
            <input type="text" id="title_cn" name="title_cn"><br><br>

            <label for="title">Original Title:</label>
            <input type="text" id="title" name="title" required><br><br>

            <label for="author_ids">Authors:</label>
            <input type="text" placeholder="Search authors" onkeyup="filterSelect(this.value, 'author_ids')"><br>
            <select multiple id="author_ids" name="author_ids">
                {% for author in authors %}
                <option value="{{ author.id }}">{{ author.name_cn or author.name }}</option>
                {% endfor %}
            </select><br><br>

            <label for="translator">Translators:</label>
            <input type="text" ><br><br>

            <label for="publisher_id">Publisher:</label>
            <select id="publisher_id" name="publisher_id">
                <option value="">Select Publisher</option>
                {% for publisher in publishers %}
                <option value="{{ publisher.id }}">{{ publisher.name }}</option>
                {% endfor %}
            </select><br><br>

            <label for="publish_date">Publish Date (YYYY-MM-DD):</label>
            <input type="date" id="publish_date" name="publish_date"><br><br>

            <label for="brand_id">Brand:</label>
            <select id="brand_id" name="brand_id">
                <option value="">Select Brand</option>
                {% for brand in brands %}
                <option value="{{ brand.id }}">{{ brand.name }}</option>
                {% endfor %}
            </select><br><br>

            <label for="book_series_id">Book Series:</label>
            <select id="book_series_id" name="book_series_id">
                <option value="">Select Series</option>
                {% for serie in series %}
                <option value="{{ serie.id }}">{{ serie.name }}</option>
                {% endfor %}
            </select><br><br>

            <label for="binding_type">Binding Type:</label>
            <input type="text" id="binding_type" name="binding_type"><br><br>

            <label for="paper_type">Paper Type:</label>
            <input type="text" id="paper_type" name="paper_type"><br><br>

            <label for="pages">Pages:</label>
            <input type="number" id="pages" name="pages"><br><br>

            <label for="book_count">Book Count:</label>
            <input type="number" id="book_count" name="book_count"><br><br>

            <label for="language">Language:</label>
            <input type="text" id="language" name="language"><br><br>

            <label for="compose_type">Compose Type:</label>
            <input type="text" id="compose_type" name="compose_type"><br><br>

            <label for="price">Price:</label>
            <input type="number" step="0.01" id="price" name="price"><br><br>

            <label for="purchase_price">Purchase Price:</label>
            <input type="number" step="0.01" id="purchase_price" name="purchase_price"><br><br>

            <label for="purchase_date">Purchase Date (YYYY-MM-DD):</label>
            <input type="date" id="purchase_date" name="purchase_date"><br><br>

            <label for="thumb_image">Thumb Image URL:</label>
            <input type="url" id="thumb_image" name="thumb_image"><br><br>

            <label for="link">Link:</label>
            <input type="url" id="link" name="link"><br><br>

            <label for="category_id">Category:</label>
            <select id="category_id" name="category_id">
                <option value="">Select Category</option>
                {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select><br><br>

            <label for="bookshelf_id">Bookshelf:</label>
            <select id="bookshelf_id" name="bookshelf_id">
                <option value="">Select Bookshelf</option>
                {% for bookshelf in bookshelves %}
                <option value="{{ bookshelf.id }}">{{ bookshelf.name }}</option>
                {% endfor %}
            </select><br><br>

            <label for="read_state">Read State:</label>
            <input type="text" id="read_state" name="read_state"><br><br>

            <label for="catalog">Catalog:</label>
            <textarea id="catalog" name="catalog"></textarea><br><br>

            <label for="introduction">Introduction:</label>
            <textarea id="introduction" name="introduction"></textarea><br><br>

            <label for="summary">Summary:</label>
            <textarea id="summary" name="summary"></textarea><br><br>

            <label for="registered">Registered:</label>
            <input type="checkbox" id="registered" name="registered"><br><br>

            <label for="edition">Edition:</label>
            <input type="text" id="edition" name="edition"><br><br>

            <label for="print">Print:</label>
            <input type="text" id="print" name="print"><br><br>

            <label for="printed_number">Printed Number:</label>
            <input type="number" id="printed_number" name="printed_number"><br><br>

            <label for="douban_score">Douban Score:</label>
            <input type="number" step="0.1" id="douban_score" name="douban_score"><br><br>

            <label for="purchase_store">Purchase Store:</label>
            <input type="text" id="purchase_store" name="purchase_store"><br><br>

            <label for="tags">Tags (comma-separated):</label>
            <input type="text" id="tags" name="tags"><br><br>

            <label for="in_wish">In Wish:</label>
            <input type="checkbox" id="in_wish" name="in_wish"><br><br>

            <button type="submit" class="btn-primary-blue">Add Book</button>
        </form>
        <a href="/books" class="btn-pill-link">Back to Books</a>
    </div>
</section>
{% endblock %}
