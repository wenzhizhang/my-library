{% extends "base.html" %}

{% block title %}Brands - My Library{% endblock %}

{% block content %}
<section class="section light">
    <div class="container">
        <h1 class="section-heading">Brands</h1>
        <a href="#" class="btn-primary-blue">Add New Brand</a>
        <div class="grid">
            {% for brand in brands %}
            <div class="card">
                <h3 class="card-title">{{ brand.name }}</h3>
                <p class="caption">{{ brand.intro }}</p>
                <a href="/brands/{{ brand.id }}" class="btn-pill-link">View Details</a>
                <a href="#" class="btn-pill-link">Edit</a>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}</content>
